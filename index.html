<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Microphone Pitch Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="tracker-card" aria-labelledby="appTitle">
        <div class="controls" aria-label="Audio controls">
          <button id="micToggleButton" type="button">Start Analysis</button>
          <label class="source-control" for="analysisModeSelect">
            <span>Source</span>
            <select id="analysisModeSelect">
              <option value="microphone">Microphone</option>
              <option value="internal">Internal tone</option>
            </select>
          </label>
          <label class="waveform-control" for="waveformSelect">
            <span>Waveform</span>
            <select id="waveformSelect">
              <option value="sine">Sine</option>
              <option value="square">Square</option>
              <option value="sawtooth">Sawtooth</option>
              <option value="triangle">Triangle</option>
            </select>
          </label>
          <button id="stopToneButton" type="button" disabled>Stop Tone</button>
          <button id="themeToggleButton" type="button">Dark Mode</button>
        </div>

        <section id="rangePanel" class="range-panel" aria-label="Display range controls">
          <label class="range-control" for="minHzInput">
            <span>Minimum Hz</span>
            <input id="minHzInput" type="number" value="50" min="1" step="1">
          </label>
          <label class="range-control" for="maxHzInput">
            <span>Maximum Hz</span>
            <input id="maxHzInput" type="number" value="2000" min="1" step="1">
          </label>
          <button id="applyRangeButton" type="button">Apply Range</button>
          <button id="resetRangeButton" type="button">Reset 50-2000 Hz</button>
          <div id="rangeError" class="range-error" aria-live="polite"></div>
        </section>

        <section class="readout" aria-live="polite">
          <div class="readout-column">
            <span class="readout-label">Detected</span>
            <div id="pitchDisplay" class="pitch-display">--&nbsp;Hz</div>
            <div id="clarityDisplay" class="clarity-display">Clarity: --</div>
            <div id="statusDisplay" class="status-display">Idle</div>
          </div>
          <div class="readout-column">
            <span class="readout-label">Generated</span>
            <div id="generatedPitchDisplay" class="pitch-display generated-display">--&nbsp;Hz</div>
            <div id="toneStatusDisplay" class="clarity-display">Tone: Off</div>
          </div>
        </section>

        <section id="targetPanel" class="target-panel" aria-label="Pitch targets">
          <h2 class="panel-heading">Pitch Targets</h2>
          <div class="target-controls">
            <label class="target-control" for="targetLabelInput">
              <span>Target label</span>
              <input id="targetLabelInput" type="text" placeholder="C4, 1/1, target 1">
            </label>
            <label class="target-control" for="targetHzInput">
              <span>Target Hz</span>
              <input id="targetHzInput" type="number" min="1" step="0.01" placeholder="261.63">
            </label>
            <button id="addHzTargetButton" type="button">Add Hz Target</button>
            <button id="clearTargetsButton" type="button">Clear Targets</button>
          </div>
          <div id="targetError" class="target-error" aria-live="polite"></div>
        </section>

        <section class="meter-section" aria-label="Pitch meter">
          <div id="pitchMeter" class="pitch-meter">
            <div id="pitchMarker" class="pitch-marker is-hidden"></div>
            <div id="toneMarker" class="tone-marker is-hidden"></div>
          </div>
          <div id="octaveScale" class="meter-scale" aria-hidden="true"></div>
        </section>
      </section>
    </main>
  </body>
</html>
