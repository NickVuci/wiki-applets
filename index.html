<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Microphone Pitch Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="tracker-card" aria-labelledby="appTitle">
        <div class="controls" aria-label="Audio controls">
          <button id="micToggleButton" type="button">Start Analysis</button>
          <label class="source-control" for="analysisModeSelect">
            <span>Source</span>
            <select id="analysisModeSelect">
              <option value="microphone">Microphone</option>
              <option value="internal">Internal tone</option>
            </select>
          </label>
          <label class="waveform-control" for="waveformSelect">
            <span>Waveform</span>
            <select id="waveformSelect">
              <option value="sine">Sine</option>
              <option value="square">Square</option>
              <option value="sawtooth">Sawtooth</option>
              <option value="triangle">Triangle</option>
            </select>
          </label>
          <button id="stopToneButton" type="button" disabled>Stop Tone</button>
          <button id="themeToggleButton" type="button">Dark Mode</button>
        </div>

        <section class="readout" aria-live="polite">
          <div class="readout-column">
            <span class="readout-label">Detected</span>
            <div id="pitchDisplay" class="pitch-display">--&nbsp;Hz</div>
            <div id="clarityDisplay" class="clarity-display">Clarity: --</div>
            <div id="statusDisplay" class="status-display">Idle</div>
          </div>
          <div class="readout-column">
            <span class="readout-label">Generated</span>
            <div id="generatedPitchDisplay" class="pitch-display generated-display">--&nbsp;Hz</div>
            <div id="toneStatusDisplay" class="clarity-display">Tone: Off</div>
          </div>
        </section>

        <section id="targetPanel" class="target-panel" aria-label="Pitch targets">
          <h2 class="panel-heading">Pitch Targets</h2>
          <div class="target-controls">
            <label class="target-control" for="targetLabelInput">
              <span>Target label</span>
              <input id="targetLabelInput" class="compact-input" type="text" maxlength="16" placeholder="C4">
            </label>
            <label class="target-control" for="targetInputMode">
              <span>Input mode</span>
              <select id="targetInputMode">
                <option value="hz">Hz</option>
                <option value="cents">Cents above root</option>
                <option value="ratio">Ratio above root</option>
              </select>
            </label>
            <label class="target-control" for="targetValueInput">
              <span id="targetValueLabel">Target Hz</span>
              <input id="targetValueInput" class="compact-input" type="text" inputmode="decimal" maxlength="16" placeholder="261.63">
            </label>
            <label id="rootHzControl" class="target-control is-hidden" for="rootHzInput">
              <span>Root Hz</span>
              <input id="rootHzInput" class="compact-input" type="number" value="261.63" min="1" step="0.01">
            </label>
            <button id="addTargetButton" type="button">Add Target</button>
            <button id="clearTargetsButton" type="button">Clear Targets</button>
          </div>
          <div id="targetError" class="target-error" aria-live="polite"></div>
        </section>

        <section id="scaleUploadPanel" class="target-panel" aria-label="Scale upload">
          <h2 class="panel-heading">Upload Scale</h2>
          <div class="target-controls">
            <label class="target-control file-control" for="sclFileInput">
              <span>.scl file</span>
              <input id="sclFileInput" type="file" accept=".scl,text/plain">
            </label>
            <label class="target-control" for="sclRootHzInput">
              <span>Root Hz</span>
              <input id="sclRootHzInput" class="compact-input" type="number" value="261.63" min="1" step="0.01">
            </label>
            <label class="checkbox-control" for="repeatScaleAcrossRangeInput">
              <input id="repeatScaleAcrossRangeInput" type="checkbox" checked>
              <span>Repeat across range</span>
            </label>
            <button id="loadScaleButton" type="button">Load Scale</button>
          </div>
          <div id="scaleUploadStatus" class="target-status" aria-live="polite"></div>
        </section>

        <section class="meter-section" aria-label="Pitch meter">
          <label class="range-preset-control" for="rangePresetSelect">
            <span>Range preset</span>
            <select id="rangePresetSelect">
              <option value="custom">Custom</option>
              <option value="low-voice">Low voice</option>
              <option value="medium-voice">Medium voice</option>
              <option value="high-voice">High voice</option>
              <option value="guitar">Guitar</option>
              <option value="violin">Violin</option>
              <option value="wide">Wide 50-2000 Hz</option>
            </select>
          </label>
          <div id="pitchMeter" class="pitch-meter">
            <div id="pitchMarker" class="pitch-marker is-hidden"></div>
            <div id="toneMarker" class="tone-marker is-hidden"></div>
          </div>
          <div class="meter-range" aria-label="Display range">
            <div class="meter-range-end meter-range-start">
              <span id="minHzDisplay" class="meter-range-display" contenteditable="plaintext-only" spellcheck="false" role="textbox" aria-label="Minimum Hz">50</span>
              <span class="meter-range-unit">Hz</span>
            </div>
            <div class="meter-range-end meter-range-endcap">
              <span id="maxHzDisplay" class="meter-range-display" contenteditable="plaintext-only" spellcheck="false" role="textbox" aria-label="Maximum Hz">2000</span>
              <span class="meter-range-unit">Hz</span>
            </div>
          </div>
          <div id="rangeError" class="range-error meter-range-error" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </body>
</html>
